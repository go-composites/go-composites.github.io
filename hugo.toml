baseURL = "https://go-composites.github.io/"
title = "go-composites"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

# Each repo card. "role" = where the type sits:
#   core       — foundational plumbing (null / error / result / base)
#   container  — value & collection types (boolean / number / string / array / dictionary)
#   combinator — higher-order composition over Result-returning steps
#   meta       — the one-import facade re-exporting the whole vocabulary
#   generic    — the type-parameterised parallel track
#   tool       — predicates and the static analyzers that enforce the invariants
[[params.repos]]
  name = "null"
  api = "Null.New() · null-object value"
  role = "core"
  result = "A null-object primitive used as the default payload across the org, so empty results carry a real value instead of a nil interface{}."
[[params.repos]]
  name = "error"
  api = "Error.New(message) · Message() · IsNull() · src/null null-error"
  role = "core"
  result = "A small Error interface (Message, IsNull) with a null-object variant, so the absence of an error is itself a value rather than a nil check."
[[params.repos]]
  name = "result"
  api = "Result.New(WithPayload / WithError) · Payload() · HasError() · Error()"
  role = "core"
  result = "The Result value type every other package returns: a payload plus an error, in the style of an Option/Result. Built on null and error, with a null-object default so a fresh Result is non-nil and error-free."
[[params.repos]]
  name = "base"
  api = "the shared foundation every composite builds on"
  role = "core"
  result = "Common scaffolding the other composites embed and reuse, keeping the per-repo surface small."
[[params.repos]]
  name = "boolean"
  api = "Boolean.New(b) · True() · False() · IsTrue() · IsFalse() · Equal · Inspect"
  role = "container"
  result = "A boxed boolean composite. Its structural IsTrue() is what array's combinators recognise as truthy, without array having to import boolean."
[[params.repos]]
  name = "number"
  api = "Number.New(WithInt / WithFloat) · arithmetic → Result"
  role = "container"
  result = "A boxed numeric value over int and float. Arithmetic returns a Result, so division by zero is an error value rather than a panic."
[[params.repos]]
  name = "bignumber"
  api = "BigNumber.FromInt64 · FromString → Result · Add/Sub/Mul/Div/Mod/Abs/Neg"
  role = "container"
  result = "An arbitrary-precision integer over math/big — Ruby's unbounded Integer. Same Result-based arithmetic as number (Div/Mod by zero are errors), so values never overflow or panic."
[[params.repos]]
  name = "rational"
  api = "Rational.FromInts / FromString → Result · Numerator/Denominator · ToFloat · arithmetic"
  role = "container"
  result = "An exact rational over math/big.Rat — Ruby's Rational. Fractions stay exact (1/3 + 1/6 == 1/2, no float error); division by a zero rational is an error Result."
[[params.repos]]
  name = "complex"
  api = "Complex.New(re, im) · FromReal · Real/Imaginary · Abs · Conjugate · arithmetic"
  role = "container"
  result = "A complex number a+bi — Ruby's Complex, over Go's complex128. Add/Sub/Mul/Div return a Result (÷ by 0+0i is an error, not NaN); Abs is the magnitude, Conjugate flips the sign of the imaginary part."
[[params.repos]]
  name = "bigfloat"
  api = "BigFloat.FromFloat64 / FromString → Result · arithmetic · ToFloat64"
  role = "container"
  result = "An arbitrary-precision float over math/big.Float (256-bit). More precision than float64 where it matters; division by zero is an error Result. Rounds out the numeric tower next to bignumber and rational."
[[params.repos]]
  name = "string"
  api = "String.New(WithGoString) · Set · ToGoString · Split · IsNull"
  role = "container"
  result = "A String value type over Go's string. Split returns a Result wrapping an array, threading the array, result and error primitives together."
[[params.repos]]
  name = "buffer"
  api = "Buffer.New() / From(s) · Append · AppendRune · Reset · ToGoString · Len"
  role = "container"
  result = "A mutable text buffer (StringBuilder) over strings.Builder — the mutable counterpart to the immutable string value. Append/AppendRune/Reset mutate in place and chain. Zero dependencies."
[[params.repos]]
  name = "array"
  api = "Array.New() · Each/Map/Filter/Reduce/Find/Any/All · Push/Pop/First/Last/Fetch"
  role = "container"
  result = "An interface{}-backed dynamic array whose methods all return a Result. Beyond stack access it carries functional combinators (Map, Filter, Reduce, Find, Any, All) that short-circuit on the first error Result."
[[params.repos]]
  name = "dictionary"
  api = "Dictionary.New(WithPairs) · Get/Set → Result · IsNull"
  role = "container"
  result = "An interface-first key/value map. Get of a missing key returns a Result carrying an error, never a panic, matching the rest of the org's failure channel."
[[params.repos]]
  name = "set"
  api = "Set.New(items…) · Add/Delete/Has · Union/Intersection/Difference · IsSubset"
  role = "container"
  result = "An unordered collection of unique items, backed by a map. Carries the usual set algebra (union/intersection/difference, subset, equality) plus Each/ToArray, with a Null-Object variant."
[[params.repos]]
  name = "orderedset"
  api = "OrderedSet.New(items…) · same algebra as set · insertion-ordered Each/ToArray"
  role = "container"
  result = "A set that remembers the order items were first added (slice + map). Same algebra as set but with deterministic iteration — handy when order matters and for reproducible output."
[[params.repos]]
  name = "sortedset"
  api = "SortedSet.New(less, items…) · sorted Each/ToArray · First/Last (min/max)"
  role = "container"
  result = "A set kept sorted by a comparator (sorted slice + map), TreeSet-like. Iteration is in comparator order and First/Last give the min/max in O(1). Set algebra preserves the order."
[[params.repos]]
  name = "bag"
  api = "Bag.New(itemsâ¦) Â· Add/Remove Â· Count Â· Sum/Union/Intersection/Difference"
  role = "container"
  result = "A multiset / counter â items with multiplicity. Count(item) gives occurrences; multiset algebra adds/maxes/mins/subtracts counts. Completes the collection family next to set, orderedset and sortedset."
[[params.repos]]
  name = "range"
  api = "Range.New(begin, end, WithStep / Exclusive) → Result · Includes · Each · ToArray"
  role = "container"
  result = "A numeric integer interval — inclusive (..) or exclusive (...), with a non-zero step. New returns a Result (a zero step is an error, not a panic); elements are exposed as Numbers."
[[params.repos]]
  name = "pair"
  api = "Pair.New(first, second) · First · Second · Equal · ToArray"
  role = "container"
  result = "A fixed two-element heterogeneous grouping — the natural key/value entry. Equal compares both slots; ToArray materialises a two-element Array. Null-Object variant included."
[[params.repos]]
  name = "symbol"
  api = "Symbol.New(name) · interned · ToGoString · Equal · Inspect"
  role = "container"
  result = "An interned, immutable identifier in the Ruby :name spirit — New(\"x\") and New(\"x\") are the same instance (a mutex-guarded registry), so identity comparison is cheap and exact."
[[params.repos]]
  name = "time"
  api = "Time.FromUnix · Parse → Result · Before/After/Add/Sub · In/Zone/UTC · Duration"
  role = "container"
  result = "A Time instant plus a Duration subpackage, over Go's stdlib time. Deterministic by design (no Now()); Parse returns a Result on bad input. IANA time zones via In/Zone/UTC (tzdata embedded for every arch). Time.Sub yields a Duration."
[[params.repos]]
  name = "date"
  api = "Date.FromYMD / Parse Â· Year/Month/Day/Weekday Â· AddDays Â· DaysBetween Â· comparisons"
  role = "container"
  result = "A calendar date (year/month/day, no time) â Ruby's Date. FromYMD/Parse return a Result so an invalid date (Feb 30) is a value, not a panic; AddDays/DaysBetween do calendar arithmetic. Null-Object variant."
[[params.repos]]
  name = "proc"
  api = "Proc.New(fn) · Call(args…) → Result · Then(next) railway"
  role = "combinator"
  result = "A first-class callable: wrap a Result-returning function and Call it, or chain with Then — feeding each payload to the next and short-circuiting on the first error. A callable value, where compose is a pipeline of steps."
[[params.repos]]
  name = "enumerator"
  api = "New / Generate · Map · Filter · Take (lazy) · ToArray / Each / First / Reduce"
  role = "combinator"
  result = "A lazy sequence in the Ruby Enumerator::Lazy spirit. Map/Filter/Take are lazy — they wrap a producer and evaluate nothing until a terminal pulls items — so Take of a finite prefix terminates even an infinite Generate source. Terminals thread the shared Result channel."
[[params.repos]]
  name = "compose"
  api = "Pipe(steps…) · Run(input, steps…) · Then · Map · Recover · Fail"
  role = "combinator"
  result = "Pipe composes Result-returning steps into one left-to-right pipeline that threads the payload forward and short-circuits on the first error; Run applies it to an input, with Recover/Fail for error handling — function composition over the shared Result channel."
[[params.repos]]
  name = "composites"
  api = "import \"github.com/go-composites/composites\" · type aliases + constructors"
  role = "meta"
  result = "The meta-package: one import that re-exports the whole vocabulary (Array, Boolean, String, Number, Dictionary, Set, Range, Pair, Symbol, Time, Date, Proc, Enumerator, BigNumber, Rational, Complex, BigFloat, OrderedSet, SortedSet, Bag, Buffer, Result, Error, Null) as type aliases and constructor values — zero wrapping cost, full interoperability."
[[params.repos]]
  name = "typed"
  api = "Result[T] · Optional[T] · Slice[T] (Map/Filter/Reduce/Find/Any/All)"
  role = "generic"
  result = "A generics parallel track: the same patterns with compile-time type safety, so a payload-type mismatch becomes a build error. Complementary to — not a replacement for — the reflective, dynamic composites."
[[params.repos]]
  name = "nonnil"
  api = "go vet analyzer · enforces the Null-Object invariant"
  role = "tool"
  result = "A go vet-style analyzer that fails the build when an interface carrying IsNull() is returned, assigned, or stored as a bare nil. Runs in CI on every repo."
[[params.repos]]
  name = "respondto"
  api = "go vet analyzer · checks reflective dispatch targets"
  role = "tool"
  result = "A go vet-style analyzer for reflective sends: it flags RespondTo / method-name calls whose target method does not exist, catching typo'd dynamic dispatch at build time."
